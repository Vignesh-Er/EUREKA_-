version: '3.8' services: # PostgreSQL Database db: image: postgres:15-alpine container_name: eureka-db environment: POSTGRES_USER: eureka POSTGRES_PASSWORD: eureka_password POSTGRES_DB: eureka ports: - "5432:5432" volumes: - postgres_data:/var/lib/postgresql/data healthcheck: test: ["CMD-SHELL", "pg_isready -U eureka"] interval: 10s timeout: 5s retries: 5 # Qdrant Vector Database qdrant: image: qdrant/qdrant:latest container_name: eureka-qdrant ports: - "6333:6333" - "6334:6334" volumes: - qdrant_data:/qdrant/storage healthcheck: test: ["CMD", "curl", "-f", "http://localhost:6333/health"] interval: 10s timeout: 5s retries: 5 # Redis for caching redis: image: redis:7-alpine container_name: eureka-redis ports: - "6379:6379" volumes: - redis_data:/data healthcheck: test: ["CMD", "redis-cli", "ping"] interval: 10s timeout: 5s retries: 5 # FastAPI Backend backend: build: context: . dockerfile: Dockerfile container_name: eureka-backend ports: - "8000:8000" environment: - DATABASE_URL=postgresql+asyncpg://eureka:eureka_password@db:5432/eureka - QDRANT_HOST=qdrant - QDRANT_PORT=6333 - REDIS_URL=redis://redis:6379/0 - NVIDIA_NEMO_API_KEY=${NVIDIA_NEMO_API_KEY} - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY} - NVIDIA_RIVA_API_KEY=${NVIDIA_RIVA_API_KEY} depends_on: - db - qdrant - redis volumes: - ./logs:/app/logs - ./uploads:/app/uploads healthcheck: test: ["CMD", "curl", "-f", "http://localhost:8000/health"] interval: 30s timeout: 10s retries: 3 volumes: postgres_data: qdrant_data: redis_data: